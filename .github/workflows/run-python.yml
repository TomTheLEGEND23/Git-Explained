name: Run Python Hello World

on:
  push:
    branches:
      - main
      - dev

jobs:
  run-hello-world:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
        
      - name: Run hello.py
        run: python hello.py
